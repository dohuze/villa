<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Код Виллы</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><circle cx='32' cy='24' r='12' fill='%23f59e0b'/><path d='M8 44c8-6 16-6 24 0s16 6 24 0' fill='none' stroke='%230ea5e9' stroke-width='4' stroke-linecap='round'/><path d='M8 54c8-6 16-6 24 0s16 6 24 0' fill='none' stroke='%230284c7' stroke-width='4' stroke-linecap='round'/></svg>" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: linear-gradient(175deg, #4facfe 0%, #00c6fb 50%, #e0f7fa 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 40px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; }
        h1 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; color: #005b82; margin-bottom: 20px; }
        p { color: #0085a1; margin-bottom: 30px; }
        #qrcode { display: flex; justify-content: center; margin-bottom: 20px; }
        #qrcode img { border: 5px solid white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .link { display: inline-block; margin-top: 10px; color: #005b82; font-weight: 600; text-decoration: none; border-bottom: 1px dashed #005b82; transition: color 0.3s; }
        .link:hover { color: #d4a934; border-color: #d4a934; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Отсканируйте QR-код</h1>
        <p>для перехода на страницу контактов виллы</p>
        
        <div id="qrcode"></div>
        
        <a href="https://lineamagazin.ru/villa/" class="link">Открыть страницу напрямую</a>
    </div>

    <!-- Библиотека для генерации QR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        new QRCode(document.getElementById("qrcode"), {
            text: "https://lineamagazin.ru/villa/",
            width: 200,
            height: 200,
            colorDark : "#005b82",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    </script>
</body>
</html>
