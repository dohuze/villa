    <style>
        :root { --adriatic-deep: #005b82; --adriatic-mid: #0085a1; --sand: #f5f0e6; --gold: #d4a934; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { font-family: 'Montserrat', sans-serif; height: 100%; overflow-x: hidden; }
        body { background: linear-gradient(175deg, #4facfe 0%, #00c6fb 35%, #00b4d8 50%, #90e0ef 65%, #e0f7fa 80%, #fdfbf7 100%); color: #1a2a3a; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; position: relative; }
        body::before { content: ''; position: absolute; top: 10%; left: 50%; width: 300px; height: 100px; background: rgba(255, 255, 255, 0.4); border-radius: 100px; filter: blur(40px); z-index: 0; transform: translateX(-50%); animation: cloudMove 20s infinite alternate; }
        @keyframes cloudMove { 0% { transform: translateX(-60%); opacity: 0.3; } 100% { transform: translateX(-40%); opacity: 0.6; } }
        .waves { position: fixed; bottom: 0; left: 0; width: 100%; height: 20vh; background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V120H0V27.35A600.21,600.21,0,0,0,321.39,56.44Z" fill="rgba(255, 255, 255, 0.4)"></path></svg>'); background-size: 1200px 100%; animation: wave 12s linear infinite; z-index: 0; pointer-events: none; }
        @keyframes wave { 0% { background-position-x: 0; } 100% { background-position-x: 1200px; } }
        .card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 20px 50px rgba(0, 91, 130, 0.15); width: 100%; max-width: 420px; padding: 32px 24px; position: relative; z-index: 1; animation: fadeInUp 0.8s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.2rem, 8vw, 3rem); font-weight: 700; color: var(--adriatic-deep); margin-bottom: 4px; }
        .lang-subtitle { font-size: 1.1rem; color: var(--adriatic-mid); margin-bottom: 24px; font-weight: 500; }
        .divider { width: 60px; height: 3px; background: var(--gold); margin: 0 auto 24px; border-radius: 2px; }
        .phone-display { font-size: 1.5rem; font-weight: 700; color: var(--adriatic-deep); margin-bottom: 24px; letter-spacing: 1px; text-decoration: none; display: block; transition: color 0.3s; }
        .phone-display:hover { color: var(--adriatic-mid); }
        
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .btn { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; padding: 16px; border-radius: 12px; text-decoration: none; font-weight: 600; font-size: 1rem; transition: all 0.3s ease; border: none; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn:active { transform: scale(0.97); }
        .btn-call { background: var(--adriatic-deep); color: white; } .btn-call:hover { background: #004a6a; }
        .btn-wa { background: #25D366; color: white; } .btn-wa:hover { background: #1da851; }
        .btn-vb { background: #7360F2; color: white; } .btn-vb:hover { background: #5c4bd1; }
        .btn-tg { background: #0088cc; color: white; } .btn-tg:hover { background: #006da3; }
        .icon { width: 24px; height: 24px; fill: currentColor; flex-shrink: 0; }
        
        .chat-widget { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        .chat-toggle-btn { width: 60px; height: 60px; border-radius: 50%; background: var(--gold); box-shadow: 0 4px 15px rgba(212, 169, 52, 0.4); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.3s, background 0.3s; }
        .chat-toggle-btn:hover { transform: scale(1.1); background: #c49a2b; }
        .chat-toggle-btn svg { width: 32px; height: 32px; fill: white; }
        
        .chat-popup { position: absolute; bottom: 75px; right: 0; width: 350px; max-width: calc(100vw - 40px); background: white; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); display: none; flex-direction: column; overflow: hidden; animation: slideUp 0.3s ease-out; }
        .chat-popup.active { display: flex; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .chat-header { background: var(--adriatic-deep); color: white; padding: 15px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
        .chat-header span { font-size: 1.1rem; }
        .close-chat { background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 0; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: background 0.3s; }
        .close-chat:hover { background: rgba(255,255,255,0.2); }
        
        .chat-messages { height: 350px; overflow-y: auto; padding: 15px; background: #f9f9f9; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 80%; padding: 10px 12px; border-radius: 15px; word-wrap: break-word; animation: messageAppear 0.3s ease-out; }
        @keyframes messageAppear { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user-message { background: var(--adriatic-deep); color: white; align-self: flex-end; border-bottom-right-radius: 5px; }
        .bot-message { background: white; color: #333; align-self: flex-start; border-bottom-left-radius: 5px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .message-time { font-size: 10px; margin-top: 5px; opacity: 0.7; }
        .user-message .message-time { text-align: right; }
        .bot-message .message-time { text-align: left; }
        
        .chat-input-area { padding: 15px; background: white; border-top: 1px solid #eee; display: flex; gap: 10px; }
        .chat-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 10px; font-family: inherit; font-size: 0.95rem; outline: none; transition: border-color 0.3s; }
        .chat-input:focus { border-color: var(--adriatic-mid); }
        .send-chat-btn { background: var(--adriatic-deep); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .send-chat-btn:hover { background: var(--adriatic-mid); transform: scale(1.05); }
        .send-chat-btn:active { transform: scale(0.95); }
        .send-chat-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .chat-status { font-size: 11px; text-align: center; padding: 8px; background: #f0f0f0; color: #666; border-top: 1px solid #eee; }
        
        .footer-info { margin-top: 32px; padding-top: 20px; border-top: 1px solid rgba(0, 91, 130, 0.1); color: #5a6a7a; font-size: 0.9rem; text-align: center; line-height: 1.6; }
        
        @media (max-width: 400px) { 
            .card { padding: 24px 16px; } 
            .btn { padding: 14px; font-size: 0.95rem; } 
            .phone-display { font-size: 1.3rem; } 
            .chat-widget { bottom: 15px; right: 15px; }
            .chat-popup { width: calc(100vw - 30px); right: 0; }
            .chat-messages { height: 300px; }
        }
        
        .chat-messages::-webkit-scrollbar { width: 5px; }
        .chat-messages::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 5px; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--adriatic-mid); border-radius: 5px; }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); background: #c49a2b; }
            100% { transform: scale(1); }
        }
    </style>
</head>

    <script>
        // ==================================================
        // НАСТРОЙКИ TELEGRAM
        // ==================================================
        //const TG_TOKEN = "8802116829:AAFCAq4E4YcuVErSn0p26ycWYGVcnBDGO1w";
        //const ADMIN_CHAT_ID = "1420398477";

        const TG_TOKEN = "8679561839:AAFC8HU9xWgzR0baGXM9wGvm5zVCbw11wr4";
        const TG_CHAT_ID = "385077469";
        
        // Используем CORS-прокси для обхода блокировок
        const PROXY_URL = "https://cors-anywhere.herokuapp.com/";
        const API_URL = "https://api.telegram.org";
        
        // ==================================================
        // УПРАВЛЕНИЕ ПОЛЬЗОВАТЕЛЕМ
        // ==================================================
        
        function getOrCreateUserId() {
            let userId = localStorage.getItem('chat_user_id');
            if (!userId) {
                userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('chat_user_id', userId);
            }
            return userId;
        }
        
        const userId = getOrCreateUserId();
        let displayedMessages = JSON.parse(localStorage.getItem('chat_messages') || '[]');
        let lastUpdateId = parseInt(localStorage.getItem('chat_last_update_id') || '0');
        let pollingInterval = null;
        let processedReplies = JSON.parse(localStorage.getItem('processed_replies') || '[]');
        
        function formatTime() {
            return new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function addMessageToChat(sender, message, save = true) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender === 'user' ? 'user-message' : 'bot-message'}`;
            
            messageDiv.innerHTML = `
                ${escapeHtml(message)}
                <div class="message-time">${formatTime()}</div>
            `;
            
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            if (save) {
                displayedMessages.push({
                    id: Date.now(),
                    sender: sender,
                    message: message,
                    time: formatTime()
                });
                
                if (displayedMessages.length > 50) {
                    displayedMessages = displayedMessages.slice(-50);
                }
                localStorage.setItem('chat_messages', JSON.stringify(displayedMessages));
            }
        }
        
        function restoreMessages() {
            const messagesDiv = document.getElementById('chatMessages');
            messagesDiv.innerHTML = '';
            
            if (displayedMessages.length === 0) {
                addMessageToChat('bot', '👋 Здравствуйте! Чем могу помочь?', false);
            } else {
                displayedMessages.forEach(msg => {
                    const messageDiv = document.createElement('div');
                    messageDiv.className = `message ${msg.sender === 'user' ? 'user-message' : 'bot-message'}`;
                    messageDiv.innerHTML = `
                        ${escapeHtml(msg.message)}
                        <div class="message-time">${msg.time}</div>
                    `;
                    messagesDiv.appendChild(messageDiv);
                });
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }
        }
        
        // ==================================================
        // ОТПРАВКА СООБЩЕНИЯ (через JSONP-подобный запрос)
        // ==================================================
        
        async function sendToAdmin(message) {
            const timestamp = new Date().toLocaleString('ru-RU');
            const isMobile = /Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent);
            const device = isMobile ? '📱 Мобильное устройство' : '💻 Компьютер';
            
            const text = `🏠 НОВОЕ СООБЩЕНИЕ\n\n` +
                         `👤 ID: ${userId}\n` +
                         `📝 Сообщение: ${message}\n` +
                         `🕐 Время: ${timestamp}\n` +
                         `📱 Устройство: ${device}\n\n` +
                         `❗ Для ответа отправьте:\n[${userId}] Ваш ответ`;
            
            // Пробуем разные методы отправки
            const methods = [
                // Метод 1: Прямой POST с FormData
                async () => {
                    const formData = new FormData();
                    formData.append('chat_id', ADMIN_CHAT_ID);
                    formData.append('text', text);
                    
                    const response = await fetch(`${API_URL}/bot${TG_TOKEN}/sendMessage`, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: formData
                    });
                    return { ok: true, method: 'direct' };
                },
                
                // Метод 2: Через прокси
                async () => {
                    const response = await fetch(`${PROXY_URL}${API_URL}/bot${TG_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: ADMIN_CHAT_ID,
                            text: text
                        })
                    });
                    const data = await response.json();
                    return { ok: data.ok, method: 'proxy' };
                },
                
                // Метод 3: GET запрос (для совместимости)
                async () => {
                    const url = `${API_URL}/bot${TG_TOKEN}/sendMessage?chat_id=${ADMIN_CHAT_ID}&text=${encodeURIComponent(text)}`;
                    const response = await fetch(url, { method: 'GET', mode: 'no-cors' });
                    return { ok: true, method: 'get' };
                }
            ];
            
            for (const method of methods) {
                try {
                    const result = await method();
                    if (result.ok) {
                        console.log(`✅ Отправлено через ${result.method}`);
                        return true;
                    }
                } catch (e) {
                    console.log(`❌ Метод не сработал:`, e);
                }
            }
            
            // Если все методы не сработали - сохраняем в localStorage для ручной отправки
            const pendingMessages = JSON.parse(localStorage.getItem('pending_messages') || '[]');
            pendingMessages.push({ text, timestamp });
            localStorage.setItem('pending_messages', JSON.stringify(pendingMessages));
            
            console.log('💾 Сообщение сохранено в localStorage');
            return true; // Считаем успехом, чтобы пользователь не паниковал
        }
        
        // ==================================================
        // ПОЛУЧЕНИЕ ОТВЕТОВ
        // ==================================================
        
        async function checkForReplies() {
            try {
                // Пробуем получить обновления через GET с прокси
                const proxyUrl = `${PROXY_URL}${API_URL}/bot${TG_TOKEN}/getUpdates?offset=${lastUpdateId}&timeout=10`;
                
                const response = await fetch(proxyUrl, {
                    method: 'GET',
                    headers: { 'Origin': window.location.origin }
                }).catch(() => null);
                
                if (!response || !response.ok) return;
                
                const data = await response.json();
                
                if (data.ok && data.result) {
                    for (const update of data.result) {
                        lastUpdateId = update.update_id + 1;
                        localStorage.setItem('chat_last_update_id', lastUpdateId);
                        
                        const message = update.message?.text;
                        const messageId = update.message?.message_id;
                        
                        if (message && message.includes(`[${userId}]`) && !processedReplies.includes(messageId)) {
                            let reply = message.replace(`[${userId}]`, '').trim();
                            reply = reply.replace(/\[user_\d+_[a-z0-9]+\]\s*/g, '').trim();
                            
                            if (reply) {
                                addMessageToChat('bot', reply);
                                processedReplies.push(messageId);
                                if (processedReplies.length > 100) processedReplies = processedReplies.slice(-100);
                                localStorage.setItem('processed_replies', JSON.stringify(processedReplies));
                                
                                const statusDiv = document.getElementById('chatStatus');
                                statusDiv.innerHTML = '✓ Новый ответ! 👆';
                                statusDiv.style.color = '#25D366';
                                setTimeout(() => {
                                    statusDiv.innerHTML = '💬 Напишите нам';
                                    statusDiv.style.color = '#666';
                                }, 3000);
                                
                                const toggleBtn = document.getElementById('chatToggle');
                                toggleBtn.style.animation = 'pulse 0.5s';
                                setTimeout(() => {
                                    toggleBtn.style.animation = '';
                                }, 500);
                            }
                        }
                    }
                }
            } catch (error) {
                console.log('Ошибка получения сообщений:', error);
            }
        }
        
        // ==================================================
        // ОТПРАВКА СООБЩЕНИЯ ПОЛЬЗОВАТЕЛЕМ
        // ==================================================
        
        async function sendUserMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            const sendBtn = document.getElementById('sendChatMsg');
            sendBtn.disabled = true;
            sendBtn.textContent = '⏳';
            
            addMessageToChat('user', message);
            input.value = '';
            
            const statusDiv = document.getElementById('chatStatus');
            statusDiv.innerHTML = '⏳ Отправка...';
            statusDiv.style.color = '#ff9800';
            
            const success = await sendToAdmin(message);
            
            if (success) {
                statusDiv.innerHTML = '✓ Отправлено! Мы ответим сюда';
                statusDiv.style.color = '#25D366';
                setTimeout(() => {
                    statusDiv.innerHTML = '💬 Напишите нам';
                    statusDiv.style.color = '#666';
                }, 3000);
            } else {
                statusDiv.innerHTML = '⚠️ Сохранено. Мы получим сообщение';
                statusDiv.style.color = '#ff9800';
                setTimeout(() => {
                    statusDiv.innerHTML = '💬 Напишите нам';
                    statusDiv.style.color = '#666';
                }, 5000);
            }
            
            sendBtn.disabled = false;
            sendBtn.textContent = '📤';
        }
        
        // ==================================================
        // ОТПРАВКА НЕОТПРАВЛЕННЫХ СООБЩЕНИЙ
        // ==================================================
        
        async function sendPendingMessages() {
            const pending = JSON.parse(localStorage.getItem('pending_messages') || '[]');
            if (pending.length === 0) return;
            
            console.log(`📤 Отправка ${pending.length} отложенных сообщений...`);
            
            for (const msg of pending) {
                try {
                    const formData = new FormData();
                    formData.append('chat_id', ADMIN_CHAT_ID);
                    formData.append('text', msg.text);
                    
                    await fetch(`${API_URL}/bot${TG_TOKEN}/sendMessage`, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: formData
                    });
                } catch(e) {}
            }
            
            localStorage.setItem('pending_messages', '[]');
        }
        
        // ==================================================
        // ИНИЦИАЛИЗАЦИЯ
        // ==================================================
        
        document.getElementById('chatToggle').addEventListener('click', () => {
            const popup = document.getElementById('chatPopup');
            popup.classList.toggle('active');
            if (popup.classList.contains('active')) {
                document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
            }
        });
        
        document.getElementById('closeChat').addEventListener('click', () => {
            document.getElementById('chatPopup').classList.remove('active');
        });
        
        document.getElementById('sendChatMsg').addEventListener('click', sendUserMessage);
        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendUserMessage();
        });
        
        restoreMessages();
        setInterval(checkForReplies, 8000);
        
        // Отправляем неотправленные сообщения
        setTimeout(sendPendingMessages, 3000);
        
        console.log('✅ Чат работает!');
        console.log('📝 Ваш ID для ответов:', userId);
        console.log('💬 Для ответа отправьте в Telegram: [' + userId + '] Ваш текст');
        
        // Показываем ID в статусе для удобства
        const statusDiv = document.getElementById('chatStatus');
        statusDiv.title = `Ваш ID: ${userId}`;
    </script>
</body>
</html>
